buildscript {
    repositories {
        maven { name = 'Forge'; url = 'https://maven.minecraftforge.net' }
        maven { name = 'Mojang'; url = 'https://libraries.minecraft.net/' }
        mavenCentral()
    }
    dependencies {
        classpath group: 'net.minecraftforge', name: 'forgegradle', version: '7+', changing: true
    }
}

apply plugin: 'eclipse'
apply plugin: 'idea'
apply plugin: 'net.minecraftforge.gradle'

version = '0.3.0'
group = 'com.betterschematics'
base.archivesName = 'betterschematics'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

minecraft {
    mappings channel: 'official', version: '1.21.1'
    runs {
        client {
            workingDirectory project.file('run')
        }
    }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.21.1-52.1.14'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
